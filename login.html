<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ITCART|Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <style>
            body{
                background: conic-gradient(at bottom right, #1d4ed8, #1e40af, #111827);
            }
            .bgg-box{
                background: linear-gradient(to left, #716f81, #b97a95, #f6ae99);
            }
            .fonttt{
                color: #F6EFBD;
            }
        </style>
</head>
<body class="p-0 m-0">
    <div class="container">
        <div class="mt-4">
            <p class="fs-5"><a href="index.html" class="text-primary text-decoration-none">Home</a></p>
        </div>
        <div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
            <div class="card shadow-lg border rounded-3" style="width: 380px;">
                <div class="card-body p-4 bgg-box border rounded-3">
                    <h2 class="text-center mb-4 mt-1 fw-bold fs-2 fonttt">Login</h2>
                    <form>
                        <div class="mb-3">
                            <label for="username" class="form-label">Username:</label>
                            <input type="text" class="form-control" id="username" placeholder="Enter username">
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label">Password:</label>
                            <input type="password" class="form-control" id="password">
                        </div>
                        <div class=" mb-3">
                            <button type="submit" class="btn btn-primary btn-lg">
                                Login
                            </button>
                        </div>
                        <p class="mb-0">
                            Not a User?
                            <a href="register.html" class="text-primary text-decoration-none">
                                Register
                            </a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
